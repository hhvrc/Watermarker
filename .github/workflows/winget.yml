name: Publish to winget

# When a GitHub Release is published (not a draft/prerelease), submit the new
# version to the Windows Package Manager community repo (microsoft/winget-pkgs)
# as a pull request.
on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Submit to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: hhvrc.Watermarker
          # The Tauri NSIS installer asset, e.g. watermarker_0.1.0_x64-setup.exe
          installers-regex: '_x64-setup\.exe$'
          # Tag to publish; the package version is derived from it (leading "v"
          # stripped). Defaults to the published release on the release trigger.
          release-tag: ${{ github.event.release.tag_name || inputs.tag }}
          # A classic PAT (public_repo scope) for an account that has forked
          # microsoft/winget-pkgs. Stored as a repo secret.
          token: ${{ secrets.WINGET_TOKEN }}
